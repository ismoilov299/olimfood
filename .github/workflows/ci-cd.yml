name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install telegram bot dependencies
        run: pip install -r telegram_bot/requirements.txt

      - name: Byte-compile all sources
        run: python -m compileall -q backend telegram_bot

      - name: App import smoke test
        working-directory: backend
        run: python -c "import main; print('FastAPI app OK:', main.app.title)"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to production
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy over SSH
        run: |
          ssh -i ~/.ssh/id_deploy -o IdentitiesOnly=yes \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
              'cd /opt/olimfood && git fetch --prune origin master && git reset --hard origin/master && bash scripts/deploy.sh'
