name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install telegram bot dependencies
        run: pip install -r telegram_bot/requirements.txt

      - name: Byte-compile all sources
        run: python -m compileall -q backend telegram_bot

      - name: App import smoke test
        working-directory: backend
        run: python -c "import main; print('FastAPI app OK:', main.app.title)"

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 3

  deploy:
    name: Deploy to production
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/master' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist

      - name: Deploy over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          : "${DEPLOY_HOST:?DEPLOY_HOST secret is not set (add it in repo Settings -> Secrets -> Actions)}"
          : "${DEPLOY_USER:?DEPLOY_USER secret is not set (add it in repo Settings -> Secrets -> Actions)}"
          : "${DEPLOY_SSH_KEY:?DEPLOY_SSH_KEY secret is not set (add it in repo Settings -> Secrets -> Actions)}"
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          SSH="ssh -i $HOME/.ssh/id_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          SCP="scp -i $HOME/.ssh/id_deploy -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new"
          TARGET="$DEPLOY_USER@$DEPLOY_HOST"

          # 1. Update code + backend/bot on the server (frontend build skipped —
          #    it was built in CI and is shipped below).
          $SSH "$TARGET" 'cd /opt/olimfood && git fetch --prune origin master && SKIP_FRONTEND_BUILD=1 bash <(git show origin/master:scripts/deploy.sh)'

          # 2. Ship the prebuilt frontend and swap it in atomically.
          tar czf dist.tgz -C dist .
          $SCP dist.tgz "$TARGET:/tmp/olimfood-dist.tgz"
          $SSH "$TARGET" 'set -e; rm -rf /opt/olimfood/frontend/dist.new && mkdir -p /opt/olimfood/frontend/dist.new && tar xzf /tmp/olimfood-dist.tgz -C /opt/olimfood/frontend/dist.new && rm -rf /opt/olimfood/frontend/dist && mv /opt/olimfood/frontend/dist.new /opt/olimfood/frontend/dist && rm -f /tmp/olimfood-dist.tgz && echo "frontend dist updated ($(ls /opt/olimfood/frontend/dist | wc -l) entries)"'
